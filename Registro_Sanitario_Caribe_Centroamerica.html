<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro Sanitario – Caribe y Centroamérica</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f5f5f2;
    --bg3: #eeede8;
    --text: #1a1a18;
    --text2: #5f5e5a;
    --text3: #88877f;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.20);
    --radius: 10px;
    --shadow: 0 2px 10px rgba(0,0,0,0.08);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #252523;
      --bg3: #2e2e2b;
      --text: #e8e6de;
      --text2: #a8a69e;
      --text3: #6e6d67;
      --border: rgba(255,255,255,0.11);
      --border2: rgba(255,255,255,0.20);
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg2);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 20px 48px;
  }

  /* ── Header ── */
  header {
    max-width: 1340px;
    margin: 0 auto 22px;
  }
  header h1 {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }
  header p {
    font-size: 13px;
    color: var(--text2);
  }

  /* ── Tabs ── */
  .tabs-wrap {
    max-width: 1340px;
    margin: 0 auto 0;
  }
  .tabs-bar {
    display: flex;
    gap: 4px;
    padding: 0 0 0 2px;
    flex-wrap: wrap;
  }
  .tab-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 9px 18px;
    border-radius: 9px 9px 0 0;
    border: 0.5px solid var(--border2);
    border-bottom: none;
    background: var(--bg3);
    color: var(--text2);
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    transition: background .13s, color .13s;
    user-select: none;
  }
  .tab-btn:hover { background: var(--bg); color: var(--text); }
  .tab-btn.active {
    background: var(--bg);
    color: var(--text);
    font-weight: 600;
    border-color: var(--border2);
  }
  .tab-flag { font-size: 17px; line-height: 1; }

  /* ── Main card ── */
  .main-card {
    max-width: 1340px;
    margin: 0 auto;
    background: var(--bg);
    border-radius: 0 12px 12px 12px;
    border: 0.5px solid var(--border2);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .country-panel { display: none; }
  .country-panel.active { display: block; }

  /* ── Flow ── */
  .flow-wrap {
    overflow-x: auto;
    padding: 26px 22px 20px;
    -webkit-overflow-scrolling: touch;
  }
  .flow-canvas {
    display: flex;
    flex-direction: column;
    gap: 0;
    min-width: 1040px;
  }
  .phase-row {
    display: flex;
    align-items: center;
    padding-bottom: 10px;
  }
  .phase-label {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    transform: rotate(180deg);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    min-width: 26px;
    text-align: center;
    padding: 4px 0;
  }
  .nodes-row {
    display: flex;
    align-items: center;
    flex: 1;
    flex-wrap: nowrap;
  }
  .node {
    position: relative;
    border-radius: var(--radius);
    border: 0.5px solid var(--border2);
    background: var(--bg);
    padding: 11px 13px;
    cursor: pointer;
    transition: box-shadow .15s, border-color .15s, transform .1s;
    min-width: 130px;
    max-width: 152px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    user-select: none;
  }
  .node:hover { box-shadow: 0 3px 12px rgba(0,0,0,.11); transform: translateY(-1px); }
  .node.active { outline: 2px solid #185FA5; outline-offset: 2px; }
  .node-title { font-size: 11.5px; font-weight: 500; line-height: 1.35; }

  /* colors */
  .c-blue   { background:#E6F1FB; border-color:#85B7EB; }
  .c-blue   .node-title { color:#0C447C; }
  .c-teal   { background:#E1F5EE; border-color:#5DCAA5; }
  .c-teal   .node-title { color:#085041; }
  .c-amber  { background:#FAEEDA; border-color:#EF9F27; }
  .c-amber  .node-title { color:#633806; }
  .c-purple { background:#EEEDFE; border-color:#AFA9EC; }
  .c-purple .node-title { color:#26215C; }
  .c-green  { background:#EAF3DE; border-color:#97C459; }
  .c-green  .node-title { color:#173404; }
  .c-red    { background:#FAECE7; border-color:#F0997B; }
  .c-red    .node-title { color:#4A1B0C; }

  @media (prefers-color-scheme: dark) {
    .c-blue   { background:#0c447c; border-color:#378add; }
    .c-blue   .node-title { color:#b5d4f4; }
    .c-teal   { background:#085041; border-color:#1d9e75; }
    .c-teal   .node-title { color:#9fe1cb; }
    .c-amber  { background:#633806; border-color:#ef9f27; }
    .c-amber  .node-title { color:#fac775; }
    .c-purple { background:#26215c; border-color:#7f77dd; }
    .c-purple .node-title { color:#cecbf6; }
    .c-green  { background:#173404; border-color:#639922; }
    .c-green  .node-title { color:#c0dd97; }
    .c-red    { background:#4a1b0c; border-color:#d85a30; }
    .c-red    .node-title { color:#f5c4b3; }
  }

  .badge-time {
    font-size: 10px; font-weight: 600;
    padding: 2px 8px; border-radius: 20px;
    white-space: nowrap; margin-top: 1px;
  }
  .badge-blue  { background:#B5D4F4; color:#042C53; }
  .badge-amber { background:#FAC775; color:#412402; }
  .badge-gray  { background:#D3D1C7; color:#2C2C2A; }
  .badge-red   { background:#F7C1C1; color:#501313; }
  .badge-warn  { background:#F4C0D1; color:#4B1528; font-size:9.5px; }

  @media (prefers-color-scheme: dark) {
    .badge-blue  { background:#0C447C; color:#B5D4F4; }
    .badge-amber { background:#633806; color:#FAC775; }
    .badge-gray  { background:#444441; color:#D3D1C7; }
    .badge-red   { background:#791F1F; color:#F7C1C1; }
    .badge-warn  { background:#72243E; color:#F4C0D1; }
  }

  .connector { display:flex; align-items:center; min-width:26px; justify-content:center; flex-shrink:0; }
  .phase-divider { height:1px; background:var(--border); margin:2px 0 2px 26px; }

  /* ── Detail panel ── */
  .hint-text {
    font-size: 12px; color: var(--text3);
    text-align: center; padding: 6px 0 2px;
  }
  .detail-panel {
    margin: 0 22px 18px;
    padding: 15px 17px;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.6;
    display: none;
  }
  .detail-panel.show { display: block; }
  .detail-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 7px; }
  .detail-body  { color: var(--text2); }
  .detail-section { margin-top: 10px; padding-top: 9px; border-top: 0.5px solid var(--border); }
  .detail-section-label { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:4px; }
  .detail-warning { color:#A32D2D; margin-top:10px; padding-top:9px; border-top:0.5px solid #F09595; }
  .detail-warning .detail-section-label { color:#A32D2D; }
  @media (prefers-color-scheme: dark) {
    .detail-warning { color:#F09595; border-top-color:#791F1F; }
    .detail-warning .detail-section-label { color:#F09595; }
  }

  /* ── Bottom bar ── */
  .bottom-bar {
    display: flex; flex-direction: column; gap: 10px;
    padding: 14px 22px 18px;
    border-top: 0.5px solid var(--border);
    background: var(--bg2);
  }
  .legend { display:flex; gap:14px; flex-wrap:wrap; align-items:center; font-size:11.5px; color:var(--text2); }
  .legend-item { display:flex; align-items:center; gap:5px; }
  .legend-dot { width:11px; height:11px; border-radius:3px; border:0.5px solid; flex-shrink:0; }
  .info-row { font-size:11.5px; color:var(--text2); line-height:1.6; }
  .info-row b { color:var(--text); font-weight:600; }

  .flow-wrap::-webkit-scrollbar { height:5px; }
  .flow-wrap::-webkit-scrollbar-track { background:var(--bg2); }
  .flow-wrap::-webkit-scrollbar-thumb { background:var(--border2); border-radius:4px; }
</style>
</head>

/* ─────────────────────────────────────────────
   RENDER
───────────────────────────────────────────── */
const tabsBar  = document.getElementById('tabsBar');
const mainCard = document.getElementById('mainCard');

function arrowSVG(color) {
  return `<svg width="26" height="18" viewBox="0 0 26 18" fill="none">
    <line x1="2" y1="9" x2="21" y2="9" stroke="${color}" stroke-width="1.4"/>
    <polyline points="16,4 22,9 16,14" fill="none" stroke="${color}" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}
function downSVG() {
  return `<svg width="14" height="22" viewBox="0 0 14 22" fill="none">
    <line x1="7" y1="2" x2="7" y2="18" stroke="rgba(0,0,0,0.18)" stroke-width="1.2"/>
    <polyline points="3,14 7,20 11,14" fill="none" stroke="rgba(0,0,0,0.18)" stroke-width="1.2" stroke-linejoin="round"/>
  </svg>`;
}

countries.forEach((country, ci) => {
  /* Tab button */
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (ci === 0 ? ' active' : '');
  btn.innerHTML = `<span class="tab-flag">${country.flag}</span>${country.name}`;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.country-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + country.id).classList.add('active');
  });
  tabsBar.appendChild(btn);

  /* Panel */
  const panel = document.createElement('div');
  panel.className = 'country-panel' + (ci === 0 ? ' active' : '');
  panel.id = 'panel-' + country.id;

  /* Flow */
  const flowWrap = document.createElement('div');
  flowWrap.className = 'flow-wrap';
  const flowCanvas = document.createElement('div');
  flowCanvas.className = 'flow-canvas';

  let activeNode = null;

  /* Detail panel */
  const hintText = document.createElement('div');
  hintText.className = 'hint-text';
  hintText.textContent = '↑ Haz clic en cualquier paso para ver detalles';

  const detailPanel = document.createElement('div');
  detailPanel.className = 'detail-panel';

  function showDetail(step) {
    let html = `<div class="detail-title">${step.label}</div>`;
    html += `<div class="detail-body">${step.detail}</div>`;
    if (step.time) {
      html += `<div class="detail-section"><div class="detail-section-label">⏱ Tiempo estimado</div>${step.time}</div>`;
    }
    if (step.notes) {
      html += `<div class="detail-section"><div class="detail-section-label">📋 Notas</div>${step.notes.replace(/\n/g,'<br>')}</div>`;
    }
    if (step.warning) {
      html += `<div class="detail-section detail-warning"><div class="detail-section-label">⚠ Advertencia importante</div>${step.warning}</div>`;
    }
    detailPanel.innerHTML = html;
    detailPanel.classList.add('show');
    hintText.style.display = 'none';
  }

  country.phases.forEach((phase, pi) => {
    if (pi > 0) {
      const div = document.createElement('div');
      div.className = 'phase-divider';
      flowCanvas.appendChild(div);
    }

    const row = document.createElement('div');
    row.className = 'phase-row';

    const label = document.createElement('div');
    label.className = 'phase-label';
    label.textContent = phase.phase;
    label.style.color = phase.phaseColor;
    row.appendChild(label);

    const nodesRow = document.createElement('div');
    nodesRow.className = 'nodes-row';

    phase.nodes.forEach((step, si) => {
      if (si > 0) {
        const conn = document.createElement('div');
        conn.className = 'connector';
        conn.innerHTML = arrowSVG(phase.arrowColor);
        nodesRow.appendChild(conn);
      }

      const node = document.createElement('div');
      node.className = 'node ' + (step.color || '');

      const title = document.createElement('div');
      title.className = 'node-title';
      title.textContent = step.label;
      node.appendChild(title);

      if (step.time) {
        const badge = document.createElement('span');
        badge.className = 'badge-time ' + (step.timeBadge || 'badge-gray');
        badge.textContent = step.time;
        node.appendChild(badge);
      }
      if (step.warning) {
        const warn = document.createElement('span');
        warn.className = 'badge-time badge-warn';
        warn.textContent = '⚠ ver nota';
        node.appendChild(warn);
      }

      node.addEventListener('click', () => {
        if (activeNode && activeNode !== node) activeNode.classList.remove('active');
        activeNode = node;
        node.classList.add('active');
        showDetail(step);
      });

      nodesRow.appendChild(node);
    });

    if (pi < country.phases.length - 1) {
      const conn = document.createElement('div');
      conn.className = 'connector';
      conn.innerHTML = arrowSVG('rgba(0,0,0,0.18)');
      nodesRow.appendChild(conn);
      const down = document.createElement('div');
      down.style.cssText = 'display:flex;align-items:center;min-width:18px;';
      down.innerHTML = downSVG();
      nodesRow.appendChild(down);
    }

    row.appendChild(nodesRow);
    flowCanvas.appendChild(row);
  });

  flowWrap.appendChild(flowCanvas);
  panel.appendChild(flowWrap);
  panel.appendChild(hintText);
  panel.appendChild(detailPanel);

  /* Bottom bar */
  const bottomBar = document.createElement('div');
  bottomBar.className = 'bottom-bar';

  const legend = document.createElement('div');
  legend.className = 'legend';
  country.legend.forEach(l => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-dot" style="background:${l.bg};border-color:${l.border}"></div><span>${l.label}</span>`;
    legend.appendChild(item);
  });

  const infoRow = document.createElement('div');
  infoRow.className = 'info-row';
  infoRow.innerHTML = country.infoRow;

  bottomBar.appendChild(legend);
  bottomBar.appendChild(infoRow);
  panel.appendChild(bottomBar);

  mainCard.appendChild(panel);
});
</script>
